linters:
  enable:
    - gofmt
    - goimports
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - misspell

linters-settings:
  goimports:
    local-prefixes: github.com/pannpers/go-apperr
  govet:
    check-shadowing: true
  misspell:
    locale: US
